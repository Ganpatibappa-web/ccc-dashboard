<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CCC Recovery Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="header">

        <h1 id="reportHeading">

            CCC Wise Recovery Dashboard

        </h1>

        <p>

            WBSEDCL Recovery Monitoring System

        </p>

    </div>


    <div class="card">

        <div class="row">

            <div class="col-9">

                <input
                    id="sheetUrl"
                    type="text"
                    placeholder="Paste Google Sheet URL">

            </div>

            <div class="col-3">

                <button
                    class="primary"
                    id="generateBtn">

                    Generate Report

                </button>

            </div>

        </div>

        <div class="toolbar">

            <button id="excelBtn">

                📥 Download Excel

            </button>

            <button
                onclick="window.print()">

                🖨 Print

            </button>

            <input
                type="text"
                id="search"
                placeholder="Search CCC...">

        </div>

    </div>


    <div
        id="loader"
        class="loader">

        Loading...

    </div>


    <div id="summary"></div>


    <div class="table-wrapper">

        <div id="report"></div>

    </div>



    <div
        id="popup"
        class="popup">

        <div
            class="popup-content">

            <span
                class="close"
                onclick="closePopup()">

                ×

            </span>

            <div
                id="popupBody">

            </div>

        </div>

    </div>



    <div class="footer">

        CCC Recovery Dashboard v3.0

    </div>

</div>


<script src="config.js"></script>

<script src="script.js"></script>

</body>

</html>
